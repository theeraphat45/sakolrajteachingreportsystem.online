<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>รีเซ็ตรหัสผ่าน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand" href="#">ระบบบันทึกการเรียนการสอน</a>
      <div><a class="btn btn-danger" href="logout.html">Logout</a></div>
    </div>
  </nav>

  <main class="container col-md-6 mx-auto py-4">
    <h3 style="color:var(--school-red)">รีเซ็ตรหัสผ่าน (Admin)</h3>
    <form id="resetForm">
      <div class="mb-2">
        <label>ผู้ใช้</label>
        <input id="resetUser" class="form-control">
      </div>
      <div class="mb-2">
        <label>รหัสผ่านใหม่</label>
        <input id="resetPass" class="form-control">
      </div>
      <div class="d-flex justify-content-between">
        <button class="btn btn-danger">บันทึก</button>
        <a class="btn btn-outline-secondary" href="users.html">ยกเลิก</a>
      </div>
    </form>
  </main>

  <script>
    document.getElementById('resetForm').addEventListener('submit', e=>{e.preventDefault();alert('รีเซ็ตสำเร็จ (ตัวอย่าง)');window.location.href='users.html'});
  </script>
</body>
</html>
