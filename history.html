<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ประวัติรายงาน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand" href="#">ระบบบันทึกการเรียนการสอน</a>
      <div><a class="btn btn-danger" href="logout.html">Logout</a></div>
    </div>
  </nav>

  <main class="container col-md-8 mx-auto py-4">
    <h3 style="color:var(--school-red)">ประวัติการรายงาน</h3>
    <div id="historyList" class="list-group mt-3"></div>
  </main>

  <script src="js/app.js"></script>
  <script>
    const list = JSON.parse(localStorage.getItem('srw_reports')||'[]');
    const el = document.getElementById('historyList');
    if(list.length===0) el.innerHTML='<div class="p-3">ยังไม่มีข้อมูล</div>';
    list.reverse().forEach(r=>{const d=document.createElement('div');d.className='list-group-item';d.innerHTML=`<div class='d-flex justify-content-between'><div><strong>${r.room}</strong> — ${r.subject}<div class='text-muted small'>${r.date} ${r.time} โดย ${r.teacher}</div></div><div>${r.status}</div></div>`;el.appendChild(d)});
  </script>
</body>
</html>
