<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logout - ยืนยัน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="container col-md-6 mx-auto text-center py-5">
    <div class="card shadow">
      <div class="card-body">
        <h5 class="card-title" style="color:var(--school-red)">ยืนยันออกจากระบบ</h5>
        <p>คุณแน่ใจหรือไม่ว่าจะออกจากระบบ?</p>
        <div class="d-flex justify-content-center gap-2">
          <button id="confirmLogout" class="btn btn-danger">ยืนยัน</button>
          <a href="index.html" class="btn btn-outline-secondary">ยกเลิก</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('confirmLogout').addEventListener('click', ()=>{
      localStorage.removeItem('srw_session');
      window.location.href='login.html';
    })
  </script>
</body>
</html>
