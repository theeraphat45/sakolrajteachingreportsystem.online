<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ฟอร์มรายงานการเรียนการสอน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand" href="#">ระบบบันทึกการเรียนการสอน</a>
      <div><a class="btn btn-danger" href="logout.html">Logout</a></div>
    </div>
  </nav>

  <main class="container col-md-8 mx-auto py-4">
    <h3 style="color:var(--school-red)">ฟอร์มรายงานการเรียนการสอน</h3>

    <form id="reportForm" class="bg-light p-3 rounded">
      <div class="row">
        <div class="col-md-6 mb-2">
          <label>วันที่เรียน</label>
          <input type="date" id="rDate" class="form-control" required>
        </div>
        <div class="col-md-6 mb-2">
          <label>ห้อง</label>
          <input id="rRoom" class="form-control" required>
        </div>
      </div>

      <div class="mb-3">
        <label>คาบเรียนที่ 1</label>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="c1_1">
          <label class="form-check-label">มีผู้เข้าสอน</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="c1_2">
          <label class="form-check-label">ไม่มีผู้เข้าสอน</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="c1_3">
          <label class="form-check-label">มีผู้สอนแทน</label>
        </div>
        <div class="mt-2">
          <label>กิจกรรมอื่น ๆ</label>
          <input id="c1_other" class="form-control">
        </div>
      </div>

      <div class="mb-3">
        <label>รายวิชา</label>
        <select id="subjectSelect" class="form-select">
          <option>ค32102 - คณิตศาสตร์ 4</option>
          <option>ค32202 - คณิตศาสตร์เพิ่มเติม 4</option>
          <option>ค30292 - คณิตศาสตร์ พสวท.2</option>
          <option>ค30298 - โครงงานคณิตศาสตร์ 1</option>
          <option>ว32286 - สัมมนาวิทย์พลังสิบ</option>
        </select>
      </div>

      <div class="mb-3">
        <label>ผู้รายงาน (ครู)</label>
        <select id="teacherSelect" class="form-select">
          <option>คุณครูวีระพล สุวรรณชัยรบ</option>
          <option>คุณครูรุจิพัชญ์ อรุวีวัฒนานนท์</option>
          <option>คุณครูผุสดี บุญหงษ์</option>
        </select>
      </div>

      <div class="d-flex justify-content-between">
        <button type="submit" class="btn btn-danger">บันทึก</button>
        <a class="btn btn-outline-secondary" href="index.html">ยกเลิก</a>
      </div>
    </form>
  </main>

  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('reportForm').addEventListener('submit', (e)=>{
      e.preventDefault();
      if(!confirm('ยืนยันการบันทึกรายงาน?')) return;
      const data={
        date:document.getElementById('rDate').value,
        room:document.getElementById('rRoom').value,
        subject:document.getElementById('subjectSelect').value,
        teacher:document.getElementById('teacherSelect').value,
        status:'reported',
        time:new Date().toLocaleTimeString()
      };
      // store to localStorage as sample backend
      const list = JSON.parse(localStorage.getItem('srw_reports')||'[]');
      list.push(data);
      localStorage.setItem('srw_reports', JSON.stringify(list));
      alert('บันทึกเรียบร้อย');
      window.location.href='dashboard_teacher.html';
    });
  </script>
</body>
</html>
