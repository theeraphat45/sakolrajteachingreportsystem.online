<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand" href="#">ระบบบันทึกการเรียนการสอน</a>
      <div>
        <a class="btn btn-danger" href="logout.html">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container col-md-6 mx-auto text-center py-4">
    <div class="card">
      <div class="card-body text-start">
        <h5 class="card-title" style="color:var(--school-red)">แก้ไขโปรไฟล์</h5>
        <form id="profileForm">
          <div class="mb-2">
            <label>ชื่อ-สกุล</label>
            <input id="fullName" class="form-control">
          </div>
          <div class="mb-2">
            <label>อีเมล</label>
            <input id="email" class="form-control">
          </div>
          <div class="d-flex justify-content-between">
            <button class="btn btn-danger">บันทึก</button>
            <a class="btn btn-outline-secondary" href="index.html">ยกเลิก</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
