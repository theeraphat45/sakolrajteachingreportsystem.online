<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - ระบบบันทึกการเรียนการสอน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="pattern-bg">
  <div class="card card-center shadow">
    <div class="card-body text-center">
      <img src="assets/logo.jpg" width="72" class="mb-2" alt="logo">
      <h4 class="card-title" style="color:var(--school-red)">เข้าสู่ระบบ</h4>
      <p class="text-muted">กรุณาเข้าสู่ระบบด้วยรหัสที่แอดมินกำหนดให้</p>

      <form id="loginForm" class="mt-3">
        <div class="mb-2 text-start">
          <label for="username">ชื่อผู้ใช้</label>
          <input id="username" class="form-control" required>
        </div>
        <div class="mb-3 text-start">
          <label for="password">รหัสผ่าน</label>
          <input id="password" type="password" class="form-control" required>
        </div>
        <div class="d-grid">
          <button class="btn btn-danger" type="submit">เข้าสู่ระบบ</button>
        </div>
      </form>

      <hr>
      <small class="text-muted">ตัวอย่าง: admin / teacher / student</small>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
