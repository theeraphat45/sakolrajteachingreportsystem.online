<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - ผู้ดูแลระบบ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="assets/logo.svg" width="40" class="me-2"> ระบบบันทึกการเรียนการสอน
      </a>
      <div>
        <a class="btn btn-outline-secondary me-2" href="profile.html">Profile</a>
        <a class="btn btn-danger" href="logout.html">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container col-md-8 mx-auto text-center py-4">
    <h2 style="color:var(--school-red)">แดชบอร์ดผู้ดูแลระบบ</h2>
    <section class="bg-light p-3 rounded my-3">
      <div class="row">
        <div class="col-md-6 mb-3">
          <div class="p-3 bg-white rounded shadow-sm text-start">
            <h6>รายงานวันนี้</h6>
            <p class="mb-0">จำนวนห้องรายงานแล้ว: <strong id="reportedCount">-</strong></p>
            <p>จำนวนห้องยังไม่รายงาน: <strong id="notReportedCount">-</strong></p>
          </div>
        </div>
        <div class="col-md-6 mb-3">
          <div class="p-3 bg-white rounded shadow-sm">
            <canvas id="adminChart" height="140"></canvas>
          </div>
        </div>
      </div>
      <div class="mt-3 text-start">
        <a class="btn btn-danger me-2" href="users.html">จัดการผู้ใช้</a>
        <a class="btn btn-outline-danger" href="classes.html">จัดการชั้นเรียน</a>
      </div>
    </section>
  </main>

  <footer class="text-center py-3 border-top">
    <small>พัฒนาโดยฝ่ายบริหารงานวิชาการ แผนกจัดการเรียนการสอน โรงเรียนสกลราชวิทยานุกูล</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
