<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>จัดการชั้นเรียน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand" href="#">ระบบบันทึกการเรียนการสอน</a>
      <div><a class="btn btn-danger" href="logout.html">Logout</a></div>
    </div>
  </nav>
  <main class="container col-md-8 mx-auto py-4">
    <h3 style="color:var(--school-red)">จัดการชั้นเรียน</h3>
    <div class="mb-3 text-end"><button class="btn btn-danger" id="addClassBtn">เพิ่มชั้นเรียน</button></div>
    <div id="classList" class="list-group"></div>
  </main>

  <script src="js/app.js"></script>
  <script>
    // simple demo data
    const classes = ['ม.1/1','ม.2/3','ม.3/2'];
    const list = document.getElementById('classList');
    classes.forEach(c=>{const el=document.createElement('div');el.className='list-group-item d-flex justify-content-between align-items-center';el.innerHTML=`${c}<div><button class='btn btn-sm btn-outline-secondary me-2'>Edit</button><button class='btn btn-sm btn-outline-danger'>Del</button></div>`;list.appendChild(el)});
  </script>
</body>
</html>
